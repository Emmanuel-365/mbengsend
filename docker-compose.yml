services:
  postgres:
    image: postgres:15-alpine
    container_name: medusa-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: medusa-store
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: medusa-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: medusa-minio
    ports:
      - "9100:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  createbuckets:
    image: minio/mc:latest
    container_name: medusa-createbuckets
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c " sleep 5; /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin; /usr/bin/mc mb myminio/medusa-bucket || true; /usr/bin/mc mb myminio/strapi-uploads || true; /usr/bin/mc anonymous set public myminio/medusa-bucket; /usr/bin/mc anonymous set public myminio/strapi-uploads; echo '{\"CORSRules\":[{\"AllowedOrigins\":[\"*\"],\"AllowedMethods\":[\"GET\",\"HEAD\",\"PUT\",\"POST\",\"DELETE\"],\"AllowedHeaders\":[\"*\"],\"ExposeHeaders\":[\"ETag\"]}]}' > /tmp/cors.json; /usr/bin/mc anonymous set-json /tmp/cors.json myminio/strapi-uploads; exit 0; "

  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: medusa-meilisearch
    environment:
      - MEILI_MASTER_KEY=meilimasterkey
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data

  strapi:
    build:
      context: ./strapi-cms
      dockerfile: Dockerfile
    container_name: medusa-strapi
    restart: unless-stopped
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: strapi
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_SSL: false
      HOST: 0.0.0.0
      PORT: 1337
      APP_KEYS: ${STRAPI_APP_KEYS:-r4QgUrEHCXMNQrXHhKH9hg==,aK+t3YoXLTq5uMzYJnA0zg==,veLizC6fuGkkkZSrDn4drA==,t4l8ppnc2k4bXon1JQYFKQ==}
      API_TOKEN_SALT: ${STRAPI_API_TOKEN_SALT:-t7fi4zVanDoAonDhIPfzQA==}
      ADMIN_JWT_SECRET: ${STRAPI_ADMIN_JWT_SECRET:-eccv9tXgdQ0g1JSCYD6gfw==}
      TRANSFER_TOKEN_SALT: ${STRAPI_TRANSFER_TOKEN_SALT:-GVfAOqS+PKK1PBUxl+bc8Q==}
      ENCRYPTION_KEY: ${STRAPI_ENCRYPTION_KEY:-hhTJpuzG0bxgIueJm0Z1hg==}
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_REGION: us-east-1
      MINIO_BUCKET: strapi-uploads
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_URL: http://localhost:9100
      STRAPI_DISABLE_UPDATE_NOTIFICATION: true
      STRAPI_HIDE_STARTUP_MESSAGE: false
    ports:
      - "1337:1337"
    volumes:
      - ./strapi-cms:/srv/app
      - ./strapi-cms/public/uploads:/srv/app/public/uploads
      - strapi_data:/srv/app/.tmp
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  backend:
    build:
      context: ./my-medusa-store
      dockerfile: Dockerfile
    container_name: medusa-backend
    restart: unless-stopped
    ports:
      - "9000:9000"
    env_file:
      - ./my-medusa-store/.env
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/medusa-store
      - REDIS_URL=redis://redis:6379
      - MEILISEARCH_HOST=http://meilisearch:7700
      - MEDUSA_CACHE_REDIS_URL=redis://redis:6379
      - MEDUSA_EVENT_BUS_REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=http://minio:9000
      - STORE_CORS=http://localhost:8001
      - AUTH_CORS=http://localhost:8001,http://localhost:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      meilisearch:
        condition: service_started

  storefront:
    build:
      context: ./my-medusa-store-storefront
      dockerfile: Dockerfile
    container_name: medusa-storefront
    restart: unless-stopped
    ports:
      - "8001:8000"
    env_file:
      - ./my-medusa-store-storefront/.env.local
    environment:
      - MEDUSA_BACKEND_URL=http://backend:9000
      - NEXT_PUBLIC_MEDUSA_BACKEND_URL=http://localhost:9000
      - NEXT_PUBLIC_BASE_URL=http://localhost:8001
    depends_on:
      - backend

  stripe:
    image: stripe/stripe-cli:latest
    container_name: medusa-stripe
    command: listen --forward-to backend:9000/hooks/payment/stripe --api-key ${STRIPE_API_KEY}
    env_file:
      - ./my-medusa-store/.env
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  minio_data:
  meili_data:
  strapi_data:
